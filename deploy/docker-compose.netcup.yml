services:
  # ─── Infrastructure ─────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: orchestrator-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-orchestrator}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${POSTGRES_DB:-orchestrator}
    ports:
      - "127.0.0.1:5438:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:     ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-orchestrator}"]
      interval: 5s
      timeout:  5s
      retries:  5
    networks: [orchestrator-net]

  redis:
    image: redis:7-alpine
    container_name: orchestrator-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6383:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test:     ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout:  3s
      retries:  5
    networks: [orchestrator-net]

  # ─── Orchestrator API ────────────────────────────────────────────
  api:
    image: ghcr.io/${GHCR_OWNER}/agent-orchestrator-api:${IMAGE_TAG:-latest}
    container_name: orchestrator-api
    restart: unless-stopped
    pull_policy: always
    ports:
      - "127.0.0.1:33002:3001"
    environment:
      NODE_ENV:         production
      PORT:             3001
      DATABASE_URL:     postgresql://${POSTGRES_USER:-orchestrator}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-orchestrator}
      REDIS_URL:        redis://redis:6379
      WORKSPACES_ROOT:  /workspaces
      CORS_ORIGINS:     ${CORS_ORIGINS}
      GITHUB_TOKEN:     ${GITHUB_TOKEN:-}
      OPENCODE_BINARY:  /usr/local/bin/opencode
      LOG_LEVEL:        ${LOG_LEVEL:-info}
      CODE_SERVER_URL:  ${CODE_SERVER_URL}
      AUTH_COOKIES_SECURE: ${AUTH_COOKIES_SECURE:-true}
    volumes:
      - workspaces:/workspaces
      - opencode_auth:/root/.local/share/opencode
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    networks: [orchestrator-net]

  # ─── Nuxt Dashboard ─────────────────────────────────────────────
  web:
    image: ghcr.io/${GHCR_OWNER}/agent-orchestrator-web:${IMAGE_TAG:-latest}
    container_name: orchestrator-web
    restart: unless-stopped
    pull_policy: always
    ports:
      - "127.0.0.1:33010:3000"
    environment:
      NODE_ENV:                 production
      PORT:                     3000
      HOST:                     0.0.0.0
      NUXT_PUBLIC_API_BASE:     ${PUBLIC_API_BASE}
      NUXT_PUBLIC_WS_BASE:      ${PUBLIC_WS_BASE}
      NUXT_PUBLIC_CODE_SERVER_URL: ${CODE_SERVER_URL}
    depends_on: [api]
    networks: [orchestrator-net]

  # ─── code-server ─────────────────────────────────────────────────
  # Runs WITHOUT its own auth — access is gated at the Caddy layer via
  # forward_auth against /api/auth/check (Better Auth session). The container
  # is reachable only inside the docker network; no host port is published.
  # CODE_SERVER_PASSWORD is therefore unused but kept for backward compat.
  code-server:
    image: codercom/code-server:4.96.4
    container_name: orchestrator-code-server
    restart: unless-stopped
    user: "0:0"
    environment:
      DOCKER_USER: root
    volumes:
      - workspaces:/home/coder/workspaces
      - code_server_data:/home/coder/.local/share/code-server
      - code_server_config:/home/coder/.config
    command: >
      --bind-addr 0.0.0.0:8080
      --auth none
      --disable-telemetry
      --disable-update-check
      /home/coder/workspaces
    networks: [orchestrator-net]

  # ─── Caddy reverse proxy w/ basic auth ──────────────────────────
  # Public ports:
  #   :8091 → web (Nuxt) + /api/* + /ws/* proxied to api
  #   :8092 → code-server (its own auth, no basic auth needed)
  # NOTE: BASIC_AUTH_HASH is a bcrypt hash. The .env entry MUST escape
  #       every `$` as `$$` (compose interpolation) — e.g.
  #       BASIC_AUTH_HASH=$$2a$$14$$abcdef...
  caddy:
    image: caddy:2-alpine
    container_name: orchestrator-caddy
    restart: unless-stopped
    ports:
      - "0.0.0.0:80:80"
      - "0.0.0.0:443:443"
      - "0.0.0.0:443:443/udp"
      - "0.0.0.0:8091:8091"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      BASIC_AUTH_USER: ${BASIC_AUTH_USER:-admin}
      BASIC_AUTH_HASH: ${BASIC_AUTH_HASH}
      # Comma-separated CIDR allowlist; default 0.0.0.0/0 allows all if unset.
      ALLOWED_IPS: ${ALLOWED_IPS:-0.0.0.0/0}
    depends_on: [web, api]
    networks: [orchestrator-net]

volumes:
  postgres_data:
  redis_data:
  workspaces:
  opencode_auth:
  code_server_data:
  code_server_config:
  caddy_data:
  caddy_config:

networks:
  orchestrator-net:
    driver: bridge

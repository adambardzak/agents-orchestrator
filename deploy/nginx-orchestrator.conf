# /etc/nginx/sites-available/orchestrator
# Agent Orchestrator — single port reverse proxy (web + api + ws)
# Basic auth protected. No HTTPS (IP-only access for now).

upstream orchestrator_web {
    server 127.0.0.1:33010;
    keepalive 32;
}

upstream orchestrator_api {
    server 127.0.0.1:33002;
    keepalive 32;
}

server {
    listen 8091;
    listen [::]:8091;
    server_name 46.62.209.17;

    # Single-user basic auth — protects everything below.
    auth_basic "Agent Orchestrator";
    auth_basic_user_file /etc/nginx/.htpasswd-orchestrator;

    client_max_body_size 50M;

    access_log /var/log/nginx/orchestrator.access.log;
    error_log  /var/log/nginx/orchestrator.error.log;

    # ── API (REST) ───────────────────────────────────────────────────
    location /api/ {
        proxy_pass http://orchestrator_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Long-running agent requests
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # ── WebSocket (events) ───────────────────────────────────────────
    location /ws {
        proxy_pass http://orchestrator_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        # Keep WS alive forever
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ── Health check (no auth so we can monitor it) ──────────────────
    location = /health {
        auth_basic off;
        proxy_pass http://orchestrator_api/health;
    }

    # ── Web (Nuxt SSR) ───────────────────────────────────────────────
    location / {
        proxy_pass http://orchestrator_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Nuxt HMR / Vite WS (not used in prod but harmless)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

# ── code-server (web VS Code) ────────────────────────────────────
upstream orchestrator_code_server {
    server 127.0.0.1:8092;
    keepalive 32;
}

server {
    listen 8092;
    listen [::]:8092;
    server_name 46.62.209.17;

    # code-server has its own password auth, but we add basic auth as
    # an extra layer (matches the rest of the stack) and rely on the
    # browser remembering it across both ports.
    auth_basic "Agent Orchestrator";
    auth_basic_user_file /etc/nginx/.htpasswd-orchestrator;

    client_max_body_size 200M;

    access_log /var/log/nginx/orchestrator-code.access.log;
    error_log  /var/log/nginx/orchestrator-code.error.log;

    location / {
        proxy_pass http://orchestrator_code_server;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection upgrade;
        proxy_set_header Accept-Encoding gzip;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # code-server uses long-lived WS for terminal & file watcher
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}

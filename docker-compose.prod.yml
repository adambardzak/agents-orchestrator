services:
  # ─── Infrastructure ─────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: orchestrator-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-orchestrator}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-orchestrator}
      POSTGRES_DB: ${POSTGRES_DB:-orchestrator}
    ports:
      - "127.0.0.1:5438:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-orchestrator}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - orchestrator-net

  redis:
    image: redis:7-alpine
    container_name: orchestrator-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6383:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - orchestrator-net

  # ─── Orchestrator API ────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    image: agent-orchestrator-api:latest
    container_name: orchestrator-api
    restart: unless-stopped
    ports:
      - "127.0.0.1:33002:3001"
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER:-orchestrator}:${POSTGRES_PASSWORD:-orchestrator}@postgres:5432/${POSTGRES_DB:-orchestrator}
      REDIS_URL: redis://redis:6379
      WORKSPACES_ROOT: /workspaces
      CORS_ORIGINS: ${CORS_ORIGINS:-http://46.62.209.17:8091}
      GITHUB_TOKEN: ${GITHUB_TOKEN}
      OPENCODE_BINARY: /usr/local/bin/opencode
      LOG_LEVEL: ${LOG_LEVEL:-info}
      CODE_SERVER_URL: ${CODE_SERVER_URL:-http://46.62.209.17:8092}
    volumes:
      - workspaces:/workspaces
      - opencode_auth:/root/.local/share/opencode
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - orchestrator-net

  # ─── Nuxt Dashboard ─────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: docker/web/Dockerfile
      args:
        NUXT_PUBLIC_API_BASE: ${PUBLIC_API_BASE:-http://46.62.209.17:8091}
        NUXT_PUBLIC_WS_BASE: ${PUBLIC_WS_BASE:-ws://46.62.209.17:8091}
    image: agent-orchestrator-web:latest
    container_name: orchestrator-web
    restart: unless-stopped
    ports:
      - "127.0.0.1:33010:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      HOST: 0.0.0.0
      NUXT_PUBLIC_API_BASE: ${PUBLIC_API_BASE:-http://46.62.209.17:8091}
      NUXT_PUBLIC_WS_BASE: ${PUBLIC_WS_BASE:-ws://46.62.209.17:8091}
    depends_on:
      - api
    networks:
      - orchestrator-net

  # ─── code-server (web VS Code) ──────────────────────────────────
  code-server:
    image: codercom/code-server:4.96.4
    container_name: orchestrator-code-server
    restart: unless-stopped
    user: "0:0"
    ports:
      - "127.0.0.1:8092:8080"
    environment:
      PASSWORD: ${CODE_SERVER_PASSWORD:-Vandl123}
      DOCKER_USER: root
    volumes:
      - workspaces:/home/coder/workspaces
      - code_server_data:/home/coder/.local/share/code-server
      - code_server_config:/home/coder/.config
    command: >
      --bind-addr 0.0.0.0:8080
      --auth password
      --disable-telemetry
      --disable-update-check
      /home/coder/workspaces
    networks:
      - orchestrator-net

volumes:
  postgres_data:
  redis_data:
  workspaces:
  opencode_auth:
  code_server_data:
  code_server_config:

networks:
  orchestrator-net:
    driver: bridge
